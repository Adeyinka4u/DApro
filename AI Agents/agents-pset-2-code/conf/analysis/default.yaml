confidence_level: 0.95
bootstrap_samples: 100
judge_model: gemini/gemini-3-flash-preview
judge_temperature: 0.0
max_parallel_judges: 12
archetypes:
  selection_method: silhouette
  n_clusters: 4
  min_clusters: 3
  max_clusters: 8
  representatives_per_cluster: 3
  random_state: 42
  text_source: rationale_only
  remove_terms:
    - public_goods
    - public goods
    - public
    - goods
    - negotiation
    - collaboration
    - catastrophe
    - threshold
    - disagreement
    - resource
    - resources
    - demand
    - demands
    - contribution
    - contributions
    - authorship
  strip_persona_ids: true
  strip_numbers: true
  debias_by_scenario: true
  normalize_embeddings: true
  tsne_perplexity: 30
  tsne_iterations: 1000
  label_max_chars: 90
