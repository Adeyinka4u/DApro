# These judge calibration parameters are (somewhat) arbitrary assumptions here, just to give you a sense
# They represent hypothetical estimates from a separate human-labeled calibration study
# q1 = sensitivity = P(judge=1 | true=1), q0 = specificity = P(judge=0 | true=0)
# n_calib_pos/n_calib_neg are assumed calibration sample sizes used for CI propagation
# Bias correction is applied only to judged semi-subjective metrics
